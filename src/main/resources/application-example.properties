spring.application.name=STEVEN_ZIPS
server.port=8080

logging.level.kr.or.ddit=info
logging.level.org.springframework.security=debug

spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# DB 설정 - 실제 값으로 변경해서 사용
spring.datasource.url=jdbc:oracle:thin:@HOST:PORT/SERVICE
spring.datasource.username=YOUR_DB_USERNAME
spring.datasource.password=YOUR_DB_PASSWORD
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
spring.servlet.multipart.file-size-threshold=20MB

# 파일 업로드 경로
kr.or.ddit.upload.path=${UPLOAD_PATH:C:/upload}

# MyBatis 설정
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.jdbc-type-for-null=varchar
mybatis.type-aliases-package=kr.or.ddit.vo
mybatis.mapper-locations=classpath:mybatis/mapper/**/*_Mapper.xml
mybatis.configuration.call-setters-on-nulls=true

# Google Drive 폴더 ID - 실제 값으로 변경
google.drive.folder-id=YOUR_GOOGLE_DRIVE_FOLDER_ID

# JWT 설정 - 실제 운영 시 안전한 키로 변경
kr.or.ddit.jwt.issuer=ddit
kr.or.ddit.jwt.secret_key=YOUR_JWT_SECRET_KEY

# PortOne 결제 설정 - 실제 값으로 변경
portone.imp-code=YOUR_PORTONE_IMP_CODE
portone.channel-key=YOUR_PORTONE_CHANNEL_KEY
portone.api-key=YOUR_PORTONE_API_KEY
portone.api-secret=YOUR_PORTONE_API_SECRET

# SMS 발송 모드
# mock: 실제 문자 발송 없이 DB 이력만 저장
# solapi: 실제 Solapi 문자 발송
sms.sender-type=mock

# Solapi 설정 - 실제 값으로 변경
solapi.api-key=YOUR_SOLAPI_API_KEY
solapi.api-secret=YOUR_SOLAPI_API_SECRET
solapi.from=YOUR_SENDER_PHONE

spring.config.import=optional:file:.env[.properties]
